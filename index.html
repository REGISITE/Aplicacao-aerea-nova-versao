<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agro Controle</title>
    <link id="manifest-link" rel="manifest" href="">
    <style>
        :root {
            --primary: #43a047;
            --primary-dark: #2e7d32;
            --bg: #121212; 
            --card-bg: #1e1e1e; 
            --text: #e0e0e0; 
            --border: #333333; 
            --accent: #FF9800;
            --input-bg: #2d2d2d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; padding-bottom: 80px; }
        .container { max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        h1 { font-size: 24px; color: var(--primary); margin-bottom: 5px; text-align: center; }
        .date-display { text-align: center; color: #999; margin-bottom: 20px; font-weight: bold; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; color: var(--text); }
        
        select, input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: var(--input-bg); color: #fff;
        }

        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .product-item { 
            display: flex; 
            align-items: center; 
            font-size: 15px; 
            background: #252525; 
            padding: 8px 4px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            min-height: 45px; 
            color: #fff;
        }
        .product-item input { margin-right: 8px; width: 18px; height: 18px; flex-shrink: 0; }

        .special-products { background: #1b2e1c; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px dashed var(--primary); }
        
        .ha-input-group { display: flex; align-items: center; gap: 10px; }
        .ha-wrapper { position: relative; flex-grow: 1; }
        .ha-wrapper input { padding-right: 40px; }
        .ha-wrapper span { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; font-weight: bold; }
        
        .calc-btn { 
            background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%);
            color: white; border: none; border-radius: 10px; width: 50px; height: 48px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            box-shadow: 0 4px 0 #1b5e20; transition: all 0.1s;
        }
        .calc-btn:active { box-shadow: 0 1px 0 #1b5e20; transform: translateY(3px); }
        .calc-btn svg { width: 26px; height: 26px; fill: white; }
        
        .radio-group { display: flex; gap: 20px; }
        .radio-item { display: flex; align-items: center; gap: 5px; font-size: 15px; color: #ccc;}

        .image-controls { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .btn-img { flex: 1; padding: 12px; text-align: center; background: #333; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; color: #fff;}
        .btn-img.camera { background: #0d47a1; border-color: #1565c0; color: #fff;}
        .btn-img.remove { background: #b71c1c; border-color: #d32f2f; color: #fff; display: none; border: 1px solid;}
        
        .canvas-container { width: 100%; border: 2px dashed #444; border-radius: 8px; margin-top: 10px; display: none; position: relative; background: #000;}
        canvas { width: 100%; touch-action: none; display: block; border-radius: 6px;}
        .canvas-hint { position: absolute; top: 10px; left: 0; width: 100%; text-align: center; color: #ff5252; font-weight: bold; text-shadow: 1px 1px 2px black; pointer-events: none;}

        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .btn-action { padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; text-align: center; transition: filter 0.2s;}
        .btn-action:active { filter: brightness(0.8); }
        .btn-copy { background: #455A64; }
        .btn-wa { background: #2E7D32; }
        .btn-group { background: #00796B; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000; }
        .calc-body { background: #222; padding: 20px; border-radius: 15px; width: 90%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #333; }
        .calc-display { width: 100%; height: 60px; font-size: 32px; text-align: right; padding: 10px; margin-bottom: 15px; background: #111; border-radius: 8px; border: 1px solid #444; color: #43a047; font-weight: bold; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .calc-grid button { padding: 15px 0; font-size: 22px; border: none; background: #333; color: white; border-radius: 10px; font-weight: bold;}
        .calc-grid button.op { background: #e65100; color: white; }
        .calc-grid button.eq { background: #43a047; color: white; grid-column: span 4; margin-top: 5px; }
        .calc-grid button.clear { background: #c62828; color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="saudacao">Bom dia!</h1>
    <div class="date-display" id="dataAtual"></div>

    <div class="form-group">
        <label>Pista:</label>
        <select id="pista">
            <option value="">Selecione...</option>
            <option value="Arizona">Arizona</option>
            <option value="Boa Esperança 8">Boa Esperança 8</option>
            <option value="Coroados">Coroados</option>
            <option value="Hangar">Hangar</option>
            <option value="Maravilha">Maravilha</option>
            <option value="Nova Marilia">Nova Marilia</option>
            <option value="Pema">Pema</option>
            <option value="São José">São José</option>
            <option value="São Lucas">São Lucas</option>
            <option value="Stella Maris">Stella Maris</option>
            <option value="Troncon">Troncon</option>
            <option value="Usina Dracena">Usina Dracena</option>
            <option value="Zenan">Zenan</option>
        </select>
    </div>

    <div class="form-group">
        <label>Piloto:</label>
        <select id="piloto">
            <option value="">Selecione...</option>
            <option value="Itaja">Itaja</option>
            <option value="Marcelo">Marcelo</option>
            <option value="Toni">Toni</option>
            <option value="Vinícius">Vinícius</option>
        </select>
    </div>

    <div class="form-group">
        <label>Gestor Responsável:</label>
        <select id="gestor">
            <option value="">Selecione...</option>
            <option value="Geovane">Geovane</option>
            <option value="João">João</option>
            <option value="Julio">Julio</option>
        </select>
    </div>

    <div class="form-group">
        <label>Motorista:</label>
        <select id="motorista">
            <option value="">Selecione...</option>
            <option value="Carlos">Carlos</option>
            <option value="Everson">Everson</option>
            <option value="Nivaldo">Nivaldo</option>
            <option value="Régis">Régis</option>
        </select>
    </div>

    <div class="form-group">
        <label>Seção:</label>
        <input type="text" id="secao" placeholder="Digite a seção">
    </div>

    <div class="form-group">
        <label>Produto:</label>
        
        <div class="special-products">
            <div class="products-grid">
                <label class="product-item"><input type="checkbox" value="Defender" class="prod-chk"> Defender</label>
                <label class="product-item"><input type="checkbox" value="Tecplus" class="prod-chk"> Tecplus</label>
            </div>
        </div>
        
        <div class="products-grid">
            <label class="product-item"><input type="checkbox" value="Actara" class="prod-chk"> Actara</label>
            <label class="product-item"><input type="checkbox" value="Altacor" class="prod-chk"> Altacor</label>
            <label class="product-item"><input type="checkbox" value="Ampligo" class="prod-chk"> Ampligo</label>
            <label class="product-item"><input type="checkbox" value="Boro" class="prod-chk"> Boro</label>
            <label class="product-item"><input type="checkbox" value="Bouveriz" class="prod-chk"> Bouveriz</label>
            <label class="product-item"><input type="checkbox" value="Bvi" class="prod-chk"> Bvi</label>
            <label class="product-item"><input type="checkbox" value="Certero" class="prod-chk"> Certero</label>
            <label class="product-item"><input type="checkbox" value="Curavial" class="prod-chk"> Curavial</label>
            <label class="product-item"><input type="checkbox" value="Metarriz" class="prod-chk"> Metarriz</label>
            <label class="product-item"><input type="checkbox" value="Modus" class="prod-chk"> Modus</label>
            <label class="product-item"><input type="checkbox" value="Pravda" class="prod-chk"> Pravda</label>
            <label class="product-item"><input type="checkbox" value="Revolux" class="prod-chk"> Revolux</label>
            <label class="product-item"><input type="checkbox" value="Riper" class="prod-chk"> Riper</label>
            <label class="product-item"><input type="checkbox" value="Roundap" class="prod-chk"> Roundap</label>
            <label class="product-item"><input type="checkbox" value="Sperto" class="prod-chk"> Sperto</label>
            <label class="product-item"><input type="checkbox" value="Tractor" class="prod-chk"> Tractor</label>
            <label class="product-item"><input type="checkbox" value="Vantacor" class="prod-chk"> Vantacor</label>
        </div>
        <input type="text" id="manualProd" placeholder="Outro produto manual...">
    </div>

    <div class="form-group">
        <label>QTD Hectares Aplicado:</label>
        <div class="ha-input-group">
            <div class="ha-wrapper">
                <input type="number" id="ha" placeholder="0.00" step="0.01">
                <span>ha</span>
            </div>
            <button type="button" class="calc-btn" onclick="openCalc()">
                <svg viewBox="0 0 24 24"><path d="M19,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V5C21,3.9,20.1,3,19,3z M13.03,7.06L14.09,6l1.41,1.41 L16.91,6l1.06,1.06l-1.41,1.41l1.41,1.41L16.91,11l-1.41-1.41L14.09,11l-1.06-1.06l1.41-1.41L13.03,7.06z M6.25,7.72h5v1.5h-5V7.72z M11.5,16h-2v2H8v-2H6v-1.5h2v-2h1.5v2h2V16z M18,17.25h-5v-1.5h5V17.25z M18,14.75h-5v-1.5h5V14.75z"/></svg>
            </button>
        </div>
    </div>

    <div class="form-group">
        <label>Área:</label>
        <div class="radio-group">
            <label class="radio-item"><input type="radio" name="area" value="Finalizada"> Finalizada</label>
            <label class="radio-item"><input type="radio" name="area" value="Não finalizada" checked> Não finalizada</label>
        </div>
    </div>

    <div class="form-group">
        <label>Observações:</label>
        <textarea id="obs" rows="2" placeholder="Notas adicionais..."></textarea>
    </div>

    <div class="form-group">
        <label>Foto / Mapa:</label>
        <div class="image-controls">
            <label class="btn-img">Galeria <input type="file" id="fGal" accept="image/*" class="hidden"></label>
            <label class="btn-img camera">Câmera <input type="file" id="fCam" accept="image/*" capture="camera" class="hidden"></label>
            <button type="button" class="btn-img remove" id="btnRem" onclick="clearImg()">Remover</button>
        </div>
        <div class="canvas-container" id="cCont">
            <div class="canvas-hint">Desenhe na foto abaixo</div>
            <canvas id="pCanvas"></canvas>
        </div>
    </div>

    <div class="action-buttons">
        <button type="button" class="btn-action btn-wa" onclick="compartilhar(false)">📲 Enviar Texto + Foto</button>
        <button type="button" class="btn-action btn-group" onclick="compartilhar(true)">👥 Ir para o Grupo</button>
        <button type="button" class="btn-action btn-copy" onclick="copiar()">📋 Apenas Copiar Texto</button>
    </div>
</div>

<div class="modal" id="mCalc">
    <div class="calc-body">
        <input type="text" class="calc-display" id="dCalc" disabled value="0">
        <div class="calc-grid">
            <button class="clear" onclick="cl()">C</button>
            <button class="op" onclick="a('/')">÷</button>
            <button class="op" onclick="a('*')">×</button>
            <button class="op" onclick="a('-')">-</button>
            <button onclick="a('7')">7</button><button onclick="a('8')">8</button><button onclick="a('9')">9</button>
            <button class="op" onclick="a('+')">+</button>
            <button onclick="a('4')">4</button><button onclick="a('5')">5</button><button onclick="a('6')">6</button>
            <button onclick="a('.')">.</button>
            <button onclick="a('1')">1</button><button onclick="a('2')">2</button><button onclick="a('3')">3</button>
            <button onclick="a('0')">0</button>
            <button class="eq" onclick="res()">INSERIR RESULTADO</button>
            <button class="clear" style="grid-column: span 4; background:#111;" onclick="closeCalc()">CANCELAR</button>
        </div>
    </div>
</div>

<script>
    const manifest = { "name": "Agro", "display": "standalone", "start_url": ".", "icons": [{"src": "https://cdn-icons-png.flaticon.com/512/2329/2329113.png", "sizes": "512x512", "type": "image/png"}] };
    document.getElementById('manifest-link').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type:'application/json'}));

    const h = new Date().getHours();
    const saud = h < 12 ? "Bom dia!" : (h < 18 ? "Boa tarde!" : "Boa noite!");
    document.getElementById('saudacao').innerText = saud;
    document.getElementById('dataAtual').innerText = new Date().toLocaleDateString('pt-BR');

    function toast(msg) {
        let t = document.getElementById("tst");
        if(!t){
            t = document.createElement("div"); t.id = "tst";
            t.setAttribute("style", "position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.9); color:#000; padding:12px 25px; border-radius:30px; z-index:9999; opacity:0; transition:0.4s; pointer-events:none; font-size:14px; font-weight:bold;");
            document.body.appendChild(t);
        }
        t.innerText = msg; t.style.opacity = "1";
        setTimeout(() => t.style.opacity = "0", 2500);
    }

    const disp = document.getElementById('dCalc');
    function openCalc(){ document.getElementById('mCalc').style.display='flex'; cl(); }
    function closeCalc(){ document.getElementById('mCalc').style.display='none'; }
    function a(v){ if(disp.value==='0' && v!=='.') disp.value=''; disp.value+=v; }
    function cl(){ disp.value='0'; }
    function res(){ 
        try{ 
            let valor = eval(disp.value);
            document.getElementById('ha').value = valor.toFixed(2); 
            closeCalc(); 
        }catch(e){ toast("Cálculo inválido"); } 
    }

    const canv = document.getElementById('pCanvas');
    const ctx = canv.getContext('2d');
    const cCont = document.getElementById('cCont');
    let desenhando = false;

    function loadImg(e){
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                cCont.style.display='block'; document.getElementById('btnRem').style.display='block';
                const ratio = cCont.clientWidth / img.width;
                canv.width = cCont.clientWidth; canv.height = img.height * ratio;
                ctx.drawImage(img, 0, 0, canv.width, canv.height);
            };
            img.src = ev.target.result;
        };
        r.readAsDataURL(f);
    }
    document.getElementById('fGal').onchange = loadImg;
    document.getElementById('fCam').onchange = loadImg;
    function clearImg(){ cCont.style.display='none'; document.getElementById('btnRem').style.display='none'; }

    function getPos(e){
        const rect = canv.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }
    canv.onmousedown = canv.ontouchstart = (e) => { desenhando=true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
    canv.onmousemove = canv.ontouchmove = (e) => { if(!desenhando) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle="#ff5252"; ctx.lineWidth=4; ctx.stroke(); };
    canv.onmouseup = canv.ontouchend = () => { desenhando=false; };

    function formatar(){
        let pSelected = Array.from(document.querySelectorAll('.prod-chk:checked')).map(c => c.value);
        const manual = document.getElementById('manualProd').value;
        if(manual) pSelected.push(manual);
        
        return `${saud}
*Data:* ${new Date().toLocaleDateString('pt-BR')}
*Pista:* ${document.getElementById('pista').value}
*Piloto:* ${document.getElementById('piloto').value}
*Gestor:* ${document.getElementById('gestor').value}
*Motorista:* ${document.getElementById('motorista').value}
*Seção:* ${document.getElementById('secao').value}
*Produtos:* ${pSelected.join(', ')}
*QTD Hectares Aplicado:* ${document.getElementById('ha').value} ha
*Área:* ${document.querySelector('input[name="area"]:checked').value}
*Obs:* ${document.getElementById('obs').value}`;
    }

    function copiar(){
        const txt = formatar();
        if(navigator.clipboard){
            navigator.clipboard.writeText(txt).then(() => toast("✅ Texto Copiado!"));
        } else {
            const temp = document.createElement("textarea"); temp.value = txt; document.body.appendChild(temp); temp.select(); document.execCommand("copy"); document.body.removeChild(temp); toast("✅ Texto Copiado!");
        }
    }

    async function compartilhar(isGroup){
        const txt = formatar();
        const hasImg = cCont.style.display === 'block';
        if(isGroup){
            copiar();
            toast("Copiado! Cole no grupo.");
            setTimeout(() => window.open("https://chat.whatsapp.com/DuRfwVlzKC97ig3FvFJxLV?mode=gi_t", "_blank"), 1200);
            return;
        }
        if(hasImg && navigator.share){
            canv.toBlob(async (blob) => {
                const file = new File([blob], "foto.jpg", {type:"image/jpeg"});
                try {
                    await navigator.share({ files: [file], text: txt });
                } catch(e) { window.open("https://wa.me/?text=" + encodeURIComponent(txt)); }
            }, "image/jpeg");
        } else {
            window.open("https://wa.me/?text=" + encodeURIComponent(txt));
        }
    }
</script>
</body>
</html>
